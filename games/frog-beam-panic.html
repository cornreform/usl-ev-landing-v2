<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const frogImg=document.getElementById('frogImg');
const bulletImg=document.getElementById('bulletImg');

let W,H,score=0,gameOver=false,animId;
let bullets=[];
let enemies=[];
let heartX,heartY;
const GROUND_Y_RATIO=0.85;

let frogPivotX;
let frogPivotY;

let aimAngle=-Math.PI/2;
let isAiming=false;

function getDifficulty(){
  return Math.floor(score/50);
}

function getEnemySpeed(){
  return 0.8+getDifficulty()*0.2;
}

function getSpawnInterval(){
  return Math.max(400,800-getDifficulty()*50);
}

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  frogPivotX=W/2;
  frogPivotY=H*GROUND_Y_RATIO;
  heartX=W-80;
  heartY=H*0.15;
}
resize();
window.addEventListener('resize',resize);

canvas.addEventListener('touchstart',e=>{e.preventDefault();isAiming=true;updateAim(e.touches[0].clientX,e.touches[0].clientY)});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(isAiming)updateAim(e.touches[0].clientX,e.touches[0].clientY)});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(isAiming){shootBullet();isAiming=false}});

canvas.addEventListener('mousedown',e=>{isAiming=true;updateAim(e.clientX,e.clientY)});
canvas.addEventListener('mousemove',e=>{if(isAiming)updateAim(e.clientX,e.clientY)});
canvas.addEventListener('mouseup',e=>{if(isAiming){shootBullet();isAiming=false}});

function updateAim(touchX,touchY){
  // BOTH reversed: finger below = aim up, finger right = aim left
  const dx=frogPivotX-touchX;  // reversed!
  const dy=frogPivotY-touchY; // reversed!
  aimAngle=Math.atan2(dy,dx);
  if(aimAngle>0) aimAngle=0;
  if(aimAngle<-Math.PI) aimAngle=-Math.PI;
}

function spawnEnemy(){
  const types=['bug','fly','bee'];
  const type=types[Math.floor(Math.random()*3)];
  const size=28+Math.random()*15;
  
  let x,y;
  if(Math.random()>0.5){
    x=Math.random()*W;
    y=-size;
  } else {
    x=W+size;
    y=Math.random()*(frogPivotY-50);
  }
  
  enemies.push({x,y,size,type,vx:0,vy:0});
}

function updateEnemyDirection(e){
  const dx=frogPivotX-e.x;
  const dy=(frogPivotY-30)-e.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>0){
    e.vx=(dx/dist)*getEnemySpeed();
    e.vy=(dy/dist)*getEnemySpeed();
  }
}

function shootBullet(){
  const speed=6;
  const mouthX=frogPivotX+Math.cos(aimAngle)*70;
  const mouthY=frogPivotY-30+Math.sin(aimAngle)*70;
  bullets.push({
    x:mouthX,
    y:mouthY,
    vx:Math.cos(aimAngle)*speed,
    vy:Math.sin(aimAngle)*speed,
    angle:aimAngle,
    life:200
  });
}

function drawFrog(){
  ctx.save();
  ctx.translate(frogPivotX, frogPivotY-30);
  ctx.rotate(aimAngle);
  ctx.drawImage(frogImg, -40, -20, 80, 40);
  ctx.restore();
}

function drawAimLine(){
  if(!isAiming) return;
  const len=120;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.7)';
  ctx.lineWidth=3;
  ctx.setLineDash([6,4]);
  ctx.beginPath();
  ctx.moveTo(frogPivotX,frogPivotY-30);
  ctx.lineTo(frogPivotX+Math.cos(aimAngle)*len,frogPivotY-30+Math.sin(aimAngle)*len);
  ctx.stroke();
  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle);
  ctx.drawImage(bulletImg, 0, 0, 335, 141, -45, -19, 90, 38);
  ctx.restore();
}

function drawHeart(x,y,size){
  ctx.save();
  ctx.translate(x,y);
  ctx.fillStyle='#e91e63';
  ctx.shadowColor='#e91e63';
  ctx.shadowBlur=15;
  ctx.beginPath();
  ctx.moveTo(0,size*0.3);
  ctx.bezierCurveTo(-size*0.5,-size*0.3,-size,-size*0.3,-size,size*0.1);
  ctx.bezierCurveTo(-size,size*0.6,0,size,0,size);
  ctx.bezierCurveTo(0,size,size,size*0.6,size,size*0.1);
  ctx.bezierCurveTo(size,-size*0.3,size*0.5,-size*0.3,0,size*0.3);
  ctx.fill();
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);
  
  if(e.type==='bug'){
    ctx.fillStyle='#212121';
    ctx.beginPath();
    ctx.ellipse(0,0,e.size,e.size*0.7,0,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#333';
    ctx.lineWidth=2;
    for(let i=-1;i<=1;i++){
      ctx.beginPath();
      ctx.moveTo(i*5,-e.size*0.5);
      ctx.lineTo(i*5-5,-e.size);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(i*5,e.size*0.5);
      ctx.lineTo(i*5-5,e.size);
      ctx.stroke();
    }
    ctx.fillStyle='#f44336';
    ctx.beginPath();
    ctx.arc(e.size*0.6,-2,3,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(e.size*0.6,2,3,0,Math.PI*2);
    ctx.fill();
  } else if(e.type==='fly'){
    ctx.fillStyle='#5d4037';
    ctx.beginPath();
    ctx.ellipse(0,0,e.size,e.size*0.8,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#e91e63';
    ctx.beginPath();
    ctx.arc(e.size*0.5,-e.size*0.3,e.size*0.45,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(e.size*0.5,e.size*0.3,e.size*0.45,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(-5,-e.size*0.8,e.size*0.4,e.size*0.25,0,0,Math.PI*2);
    ctx.fill();
  } else {
    ctx.fillStyle='#ffc107';
    ctx.beginPath();
    ctx.ellipse(0,0,e.size,e.size*0.6,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#000';
    for(let i=-2;i<=2;i++){
      ctx.fillRect(i*e.size*0.25-1,-e.size*0.6,2,e.size*1.2);
    }
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.ellipse(-e.size*0.3,-e.size*0.9,e.size*0.35,e.size*0.2,0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-e.size*0.3,e.size*0.9,e.size*0.35,e.size*0.2,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawBackground(){
  ctx.fillStyle='#5c94fc';
  ctx.fillRect(0,0,W,H);
  
  ctx.fillStyle='#fff';
  for(let i=0;i<5;i++){
    const cx=((Date.now()/120+i*200)%(W+120))-60;
    const cy=50+i*50;
    ctx.beginPath();
    ctx.arc(cx,cy,14,0,Math.PI*2);
    ctx.arc(cx+12,cy-5,10,0,Math.PI*2);
    ctx.arc(cx+22,cy,14,0,Math.PI*2);
    ctx.fill();
  }
}

let lastSpawn=0;
function loop(ts){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  
  drawAimLine();
  drawFrog();
  
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;
    b.y+=b.vy;
    b.life--;
    
    if(b.life>0){
      drawBullet(b);
    }
    
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(Math.abs(b.x-e.x)<e.size+25 && Math.abs(b.y-e.y)<e.size+25){
        bullets.splice(i,1);
        enemies.splice(j,1);
        score+=5+Math.floor(Math.random()*6);
        document.getElementById('score').textContent='SCORE: '+score;
        document.getElementById('progress').textContent='ENEMIES: '+score;
        break;
      }
    }
    
    if(b.x<0 || b.x>W || b.y<0 || b.y>H || b.life<=0){
      bullets.splice(i,1);
    }
  }
  
  if(ts-lastSpawn>getSpawnInterval() && !gameOver){
    spawnEnemy();
    lastSpawn=ts;
  }
  
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    updateEnemyDirection(e);
    e.x+=e.vx;
    e.y+=e.vy;
    drawEnemy(e);
    
    if(Math.abs(e.x-frogPivotX)<50 && Math.abs(e.y-(frogPivotY-20))<40){
      gameOver=true;
      document.getElementById('gameover').style.display='block';
    }
    
    if(e.x<-e.size*2 || e.y<-e.size*2){
      enemies.splice(i,1);
    }
  }
  
  drawHeart(heartX,heartY,28);
  
  if(!gameOver) animId=requestAnimationFrame(loop);
}

let imagesReady=0;
frogImg.onload=function(){imagesReady++;if(imagesReady>=2)loop(0);};
bulletImg.onload=function(){imagesReady++;if(imagesReady>=2)loop(0);};
if(frogImg.complete && bulletImg.complete) loop(0);

function restart(){
  score=0;gameOver=false;bullets=[];enemies=[];
  aimAngle=-Math.PI/2;
  document.getElementById('score').textContent='SCORE: 0';
  document.getElementById('progress').textContent='ENEMIES: 0';
  document.getElementById('gameover').style.display='none';
  cancelAnimationFrame(animId);
  loop(0);
}

document.getElementById('gameover').addEventListener('click',restart);
document.getElementById('gameover').addEventListener('touchstart',restart);
</script>
</body>
</html>
