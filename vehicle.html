<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title id="pageTitle">Ultimate Speed Limited - Loading...</title>
    <meta id="metaDesc" name="description" content="Loading vehicle details...">
    
    <!-- Open Graph / Facebook -->
    <meta id="ogTitle" property="og:title" content="Ultimate Speed Limited">
    <meta id="ogDesc" property="og:description" content="">
    <meta id="ogImage" property="og:image" content="">
    <meta id="ogUrl" property="og:url" content="">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Ultimate Speed Limited">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta id="twitterTitle" name="twitter:title" content="Ultimate Speed Limited">
    <meta id="twitterDesc" name="twitter:description" content="">
    <meta id="twitterImage" name="twitter:image" content="">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0D0D0D;
            --bg-secondary: #141414;
            --bg-surface: #1A1A1A;
            --border: #2A2A2A;
            --border-light: #3A3A3A;
            --electric-blue: #00A8E0;
            --electric-glow: rgba(0, 168, 224, 0.12);
            --electric-glow-strong: rgba(0, 168, 224, 0.25);
            --teal: #00D4AA;
            --teal-glow: rgba(0, 212, 170, 0.12);
            --gold: #C9A227;
            --white: #FFFFFF;
            --off-white: #E5E5E5;
            --muted: #888888;
            --muted-dark: #555555;
            --success: #00D4AA;
            --error: #FF4444;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Playfair Display', Georgia, serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--white);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--electric-blue), var(--teal));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
        }

        .logo-text span {
            color: var(--electric-blue);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--off-white);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: var(--electric-blue);
            color: var(--electric-blue);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 24px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--electric-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--muted);
            font-size: 14px;
        }

        /* Error */
        .error {
            text-align: center;
            padding: 60px 24px;
            max-width: 400px;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .error-message {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Vehicle Card */
        .vehicle-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            max-width: 800px;
            width: 100%;
        }

        .vehicle-image {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--bg-surface);
        }

        .vehicle-content {
            padding: 32px;
        }

        .vehicle-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .vehicle-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
        }

        .vehicle-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .vehicle-badge.new {
            background: var(--electric-glow-strong);
            color: var(--electric-blue);
            border: 1px solid var(--electric-blue);
        }

        .vehicle-badge.available {
            background: var(--teal-glow);
            color: var(--teal);
            border: 1px solid var(--teal);
        }

        .vehicle-badge.sold {
            background: rgba(255, 68, 68, 0.12);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .vehicle-price {
            font-size: 24px;
            font-weight: 600;
            color: var(--electric-blue);
            margin-bottom: 24px;
        }

        .vehicle-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .spec-tag {
            padding: 8px 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            color: var(--off-white);
        }

        .vehicle-description {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 32px;
            background: var(--white);
            color: var(--bg-primary);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.2);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 13px;
        }

        .footer a {
            color: var(--electric-blue);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .vehicle-title {
                font-size: 22px;
            }
            .vehicle-price {
                font-size: 20px;
            }
            .vehicle-content {
                padding: 24px;
            }
            .vehicle-header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">Ultimate <span>Speed</span></div>
        </a>
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            返回網站
        </a>
    </header>

    <main class="main">
        <!-- Loading State -->
        <div id="loadingState" class="loading">
            <div class="loading-spinner"></div>
            <p class="loading-text">載入車輛資料...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error" style="display: none;">
            <div class="error-icon">🚗</div>
            <h2 class="error-title">車輛不存在</h2>
            <p class="error-message">此車輛可能已下架或連結已失效</p>
            <a href="index.html" class="cta-button">返回主頁</a>
        </div>

        <!-- Vehicle Content -->
        <div id="vehicleContent" class="vehicle-card" style="display: none;">
            <img id="vehicleImage" class="vehicle-image" src="" alt="">
            <div class="vehicle-content">
                <div class="vehicle-header">
                    <h1 id="vehicleTitle" class="vehicle-title"></h1>
                    <span id="vehicleBadge" class="vehicle-badge"></span>
                </div>
                <div id="vehiclePrice" class="vehicle-price"></div>
                <div id="vehicleSpecs" class="vehicle-specs"></div>
                <p id="vehicleDescription" class="vehicle-description"></p>
                <a href="index.html" class="cta-button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                    立即預約
                </a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2024 Ultimate Speed Limited. All rights reserved. | <a href="index.html">www.ultimate-speed.hk</a></p>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSy...0RNg",
            authDomain: "uslweb-c2d9c.firebaseapp.com",
            databaseURL: "https://uslweb-c2d9c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "uslweb-c2d9c",
            storageBucket: "uslweb-c2d9c.firebasestorage.app",
            messagingSenderId: "450947693009",
            appId: "1:450947693009:web:ab539d7233e04f8c0b48f0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Get vehicle ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const vehicleId = urlParams.get('id');

        if (!vehicleId) {
            showError();
        } else {
            loadVehicle(vehicleId);
        }

        async function loadVehicle(id) {
            try {
                const doc = await db.collection('vehicles').doc(id).get();

                if (!doc.exists) {
                    showError();
                    return;
                }

                const v = doc.data();
                const canonicalUrl = `https://www.ultimate-speed.hk/vehicle.html?id=${id}`;
                const title = `${v.year} ${v.make} ${v.model}`;
                const imageUrl = v.images && v.images[0] ? v.images[0] : '';

                // Set page title and meta
                document.title = `${title} | Ultimate Speed Limited`;
                document.getElementById('metaDesc').content = v.description || `${title} - ${v.price}`;

                // Set OG tags
                document.getElementById('ogTitle').content = title;
                document.getElementById('ogDesc').content = v.description || `${title} - ${v.price}`;
                document.getElementById('ogImage').content = imageUrl;
                document.getElementById('ogUrl').content = canonicalUrl;

                // Set Twitter tags
                document.getElementById('twitterTitle').content = title;
                document.getElementById('twitterDesc').content = v.description || `${title} - ${v.price}`;
                document.getElementById('twitterImage').content = imageUrl;

                // Render vehicle card
                document.getElementById('vehicleImage').src = imageUrl;
                document.getElementById('vehicleImage').alt = title;
                document.getElementById('vehicleTitle').textContent = title;
                document.getElementById('vehiclePrice').textContent = v.price;

                // Badge
                const badge = document.getElementById('vehicleBadge');
                const badgeText = v.badge || (v.status === 'available' ? 'AVAILABLE' : v.status?.toUpperCase() || '');
                badge.textContent = badgeText;
                badge.className = 'vehicle-badge ' + (v.status || '');

                // Specs
                const specsEl = document.getElementById('vehicleSpecs');
                specsEl.innerHTML = (v.specs || []).map(s => `<span class="spec-tag">${s}</span>`).join('');

                // Description
                document.getElementById('vehicleDescription').textContent = v.description || '';

                // Show content
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('vehicleContent').style.display = 'block';

            } catch (err) {
                console.error('Error loading vehicle:', err);
                showError();
            }
        }

        function showError() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
        }
    </script>
</body>
</html>
