<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>全部車款 | Ultimate Speed Limited</title>
    <meta name="description" content="Ultimate Speed Limited 精選電動車車款一覽，SUV、轎車、MPV、輕型貨車，全部車款盡在眼前。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.min.css">
    <!-- Mobile stylesheet: only active when .mobile class is present on <html> -->
    <link rel="stylesheet" href="mobile-styles.min.css">
    <script>
        (function() {
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                || (navigator.maxTouchPoints && navigator.maxTouchPoints > 2 && window.innerWidth < 769);
            if (isMobile) {
                document.documentElement.classList.add('mobile');
            }
        })();
    </script>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>\">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav" id="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-text">USL</span>
                <span class="logo-line"></span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#vehicles" class="nav-link">車款</a></li>
                <li><a href="index.html#services" class="nav-link">專業服務</a></li>
                <li><a href="index.html#regulatory" class="nav-link">法規參考</a></li>
                <li><a href="index.html#about" class="nav-link">關於</a></li>
                <li><a href="index.html#contact" class="nav-link">聯絡</a></li>
            </ul>
            <a href="index.html#contact" class="nav-cta">立即查詢</a>
            <button class="nav-toggle" id="navToggle" aria-label="開啟選單">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-menu-close" id="mobileMenuClose" aria-label="關閉選單">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <ul class="mobile-menu-links">
            <li><a href="index.html#vehicles" class="mobile-menu-link">車款</a></li>
            <li><a href="index.html#services" class="mobile-menu-link">專業服務</a></li>
            <li><a href="index.html#regulatory" class="mobile-menu-link">法規參考</a></li>
            <li><a href="index.html#about" class="mobile-menu-link">關於</a></li>
            <li><a href="index.html#contact" class="mobile-menu-link">聯絡</a></li>
            <li><a href="index.html#contact" class="mobile-menu-cta">立即查詢</a></li>
        </ul>
    </div>

    <!-- Page Header -->
    <section class="section vehicles-page-header">
        <div class="container">
            <div class="section-header">
                <h1 class="section-title animate-on-scroll">全部車款</h1>
                <p class="section-subtitle animate-on-scroll">精選電動車，覆蓋 SUV、轎車、MPV 及輕型貨車</p>
            </div>
        </div>
    </section>

    <!-- Full Vehicles Listing -->
    <section class="section vehicles" id="vehicles">
        <div class="container">
            <div class="vehicle-search-wrapper animate-on-scroll">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="vehicleSearchInput" class="vehicle-search-input" placeholder="搜尋品牌、型號、年份... 例如：Toyota、SUV、2023">
                <button class="search-clear-btn" id="searchClearBtn" style="display:none;">✕</button>
            </div>
            <div class="vehicle-filters animate-on-scroll">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="suv">SUV</button>
                <button class="filter-btn" data-filter="sedan">轎車</button>
                <button class="filter-btn" data-filter="sports">跑車</button>
                <button class="filter-btn" data-filter="mpv">MPV</button>
                <button class="filter-btn" data-filter="lightgoods">輕型貨車</button>
            </div>
            <div class="vehicle-grid" id="vehicleGrid">
                <!-- Vehicle cards will be injected by JS -->
            </div>
        </div>
    </section>

    <!-- Vehicle Detail Modal -->
    <div class="modal-overlay" id="vehicleModal">
        <div class="modal-container">
            <button class="modal-close" id="vehicleModalClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="modal-content vehicle-detail-modal">
                <div class="vehicle-gallery">
                    <div class="gallery-main">
                        <img src="" alt="" id="galleryMainImage">
                        <button class="gallery-nav gallery-prev" id="galleryPrev">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"/>
                            </svg>
                        </button>
                        <button class="gallery-nav gallery-next" id="galleryNext">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18l6-6-6-6"/>
                            </svg>
                        </button>
                    </div>
                    <div class="gallery-thumbnails" id="galleryThumbnails"></div>
                </div>
                <div class="vehicle-detail-content">
                    <div class="vehicle-detail-header">
                        <span class="vehicle-detail-badge" id="vehicleBadge"></span>
                        <h2 class="vehicle-detail-title" id="vehicleTitle"></h2>
                        <div class="vehicle-detail-price" id="vehiclePrice"></div>
                    </div>
                    <div class="vehicle-detail-specs" id="vehicleSpecs"></div>
                    <p class="vehicle-detail-description" id="vehicleDescription"></p>
                    <button class="btn-primary booking-cta" id="openBookingModal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2"/>
                            <path d="M16 2v4M8 2v4M3 10h18"/>
                        </svg>
                        預約睇車
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-container">
            <button class="modal-close" id="bookingModalClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="modal-content booking-modal-content">
                <div class="booking-left">
                    <h2 class="booking-title">預約睇車</h2>
                    <p class="booking-subtitle" id="bookingVehicleName"></p>
                    <div class="booking-form">
                        <div class="booking-section">
                            <h3 class="booking-section-title">選擇日期</h3>
                            <div class="date-grid" id="dateGrid"></div>
                        </div>
                        <div class="booking-section">
                            <h3 class="booking-section-title">選擇時間</h3>
                            <div class="time-slots" id="timeSlots"></div>
                        </div>
                        <div class="booking-section">
                            <h3 class="booking-section-title">您的資料</h3>
                            <div class="form-group">
                                <label for="clientName" class="form-label">姓名 <span class="required">*</span></label>
                                <input type="text" id="clientName" class="form-input" placeholder="請輸入姓名" required>
                            </div>
                            <div class="form-group">
                                <label for="clientPhone" class="form-label">電話 <span class="required">*</span></label>
                                <input type="tel" id="clientPhone" class="form-input" placeholder="例：91234567" required>
                            </div>
                        </div>
                        <button class="btn-primary booking-submit" id="confirmBooking">
                            與專人聯絡
                        </button>
                    </div>
                </div>
                <div class="booking-right">
                    <div class="booking-vehicle-card">
                        <img id="bookingVehicleImage" src="" alt="Vehicle">
                        <div class="booking-vehicle-info">
                            <div class="booking-vehicle-name" id="bookingVehicleCardName"></div>
                            <div class="booking-vehicle-price" id="bookingVehiclePrice"></div>
                            <div class="booking-vehicle-specs" id="bookingVehicleSpecs"></div>
                            <div class="booking-vehicle-desc" id="bookingVehicleDesc"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer placeholder -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Ultimate Speed Limited. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
