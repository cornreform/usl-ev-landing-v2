<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A8E0;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#bg)" width="800" height="450"/>
  
  <!-- Glow effect -->
  <ellipse cx="400" cy="280" rx="200" ry="80" fill="url(#accent)"/>
  
  <!-- Car silhouette -->
  <g fill="#1A1A1A" stroke="#2A2A2A" stroke-width="2">
    <!-- Car body -->
    <path d="M200 320 L180 280 L220 260 L280 240 L520 240 L580 260 L620 280 L600 320 L580 340 L220 340 Z"/>
    <!-- Roof -->
    <path d="M280 240 L320 200 L480 200 L520 240" fill="none"/>
    <!-- Windows -->
    <path d="M290 235 L325 205 L475 205 L510 235 Z" fill="#0D0D0D"/>
    <!-- Wheels -->
    <circle cx="260" cy="340" r="35" fill="#0D0D0D" stroke="#00A8E0" stroke-width="1.5"/>
    <circle cx="540" cy="340" r="35" fill="#0D0D0D" stroke="#00A8E0" stroke-width="1.5"/>
  </g>
  
  <!-- EV bolt icon -->
  <g transform="translate(400, 160)">
    <path d="M0 -30 L15 -5 L5 -5 L10 20 L-5 0 L5 0 Z" fill="#00A8E0" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="400" font-family="'Inter', sans-serif" font-size="16" fill="#888888" text-anchor="middle">
    USL EV Preview
  </text>
</svg>